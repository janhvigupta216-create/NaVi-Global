```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaVi Global</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#081120;
color:white;
}

nav{
background:#0d1b2a;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:#38bdf8;
}

.container{
width:90%;
max-width:500px;
margin:50px auto;
}

.card{
background:#112240;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

h2{
text-align:center;
margin-bottom:20px;
color:#38bdf8;
}

input,select{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#0ea5e9;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.link{
text-align:center;
margin-top:15px;
}

.link a{
color:#38bdf8;
cursor:pointer;
text-decoration:none;
}

.dashboard{
display:none;
}

.info{
background:#1b3358;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.logout{
background:#ef4444;
margin-top:15px;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:45px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:#cbd5e1;
}
</style>
</head>
<body>

<nav>
<div class="logo">NaVi Global</div>
</nav>

<div class="hero">
<h1>Welcome to NaVi Global</h1>
<p>AI Powered Global Business Platform</p>
</div>

<div class="container">

<!-- REGISTER -->
<div class="card" id="registerBox">

<h2>Create Account</h2>

<input type="text" id="regName" placeholder="Full Name">

<input type="number" id="regAge" placeholder="Age">

<input type="tel" id="regMobile" placeholder="Mobile Number">

<select id="regCountry">
<option value="">Select Country</option>
<option>India</option>
<option>USA</option>
<option>UK</option>
<option>Canada</option>
<option>Australia</option>
<option>Germany</option>
<option>Japan</option>
</select>

<button onclick="registerUser()">Register</button>

<div class="link">
Already have an account?
<a onclick="showLogin()">Login</a>
</div>

</div>

<!-- LOGIN -->
<div class="card" id="loginBox" style="display:none">

<h2>Login</h2>

<input type="tel" id="loginMobile" placeholder="Enter Mobile Number">

<button onclick="loginUser()">Login</button>

<div class="link">
Don't have an account?
<a onclick="showRegister()">Register</a>
</div>

</div>

<!-- DASHBOARD -->
<div class="card dashboard" id="dashboard">

<h2>User Dashboard</h2>

<div class="info">
<b>Name:</b>
<span id="dashName"></span>
</div>

<div class="info">
<b>Age:</b>
<span id="dashAge"></span>
</div>

<div class="info">
<b>Mobile:</b>
<span id="dashMobile"></span>
</div>

<div class="info">
<b>Country:</b>
<span id="dashCountry"></span>
</div>

<button class="logout" onclick="logoutUser()">
Logout
</button>

</div>

</div>

<script>

function showLogin(){
document.getElementById("registerBox").style.display="none";
document.getElementById("loginBox").style.display="block";
}

function showRegister(){
document.getElementById("loginBox").style.display="none";
document.getElementById("registerBox").style.display="block";
}

function registerUser(){

let name=document.getElementById("regName").value;
let age=document.getElementById("regAge").value;
let mobile=document.getElementById("regMobile").value;
let country=document.getElementById("regCountry").value;

if(!name || !age || !mobile || !country){
alert("Please fill all fields");
return;
}

const user={
name:name,
age:age,
mobile:mobile,
country:country
};

localStorage.setItem(
"user_"+mobile,
JSON.stringify(user)
);

alert("Registration Successful");

showLogin();
}

function loginUser(){

let mobile=document.getElementById("loginMobile").value;

let user=localStorage.getItem("user_"+mobile);

if(!user){
alert("User Not Found");
return;
}

user=JSON.parse(user);

document.getElementById("dashName").innerText=user.name;
document.getElementById("dashAge").innerText=user.age;
document.getElementById("dashMobile").innerText=user.mobile;
document.getElementById("dashCountry").innerText=user.country;

document.getElementById("loginBox").style.display="none";
document.getElementById("registerBox").style.display="none";
document.getElementById("dashboard").style.display="block";

localStorage.setItem("loggedInUser",mobile);
}

function logoutUser(){

localStorage.removeItem("loggedInUser");

document.getElementById("dashboard").style.display="none";
document.getElementById("loginBox").style.display="block";
}

window.onload=function(){

let mobile=localStorage.getItem("loggedInUser");

if(mobile){

let user=localStorage.getItem("user_"+mobile);

if(user){

user=JSON.parse(user);

document.getElementById("dashName").innerText=user.name;
document.getElementById("dashAge").innerText=user.age;
document.getElementById("dashMobile").innerText=user.mobile;
document.getElementById("dashCountry").innerText=user.country;

document.getElementById("registerBox").style.display="none";
document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";
}
}
}

</script>

</body>
</html>
