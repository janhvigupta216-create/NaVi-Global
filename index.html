<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NaVi Global - Signup</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#081120;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
background:#112240;
width:100%;
max-width:500px;
padding:35px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo h1{
color:#38bdf8;
font-size:32px;
}

.logo p{
color:#cbd5e1;
margin-top:5px;
}

form{
display:flex;
flex-direction:column;
gap:15px;
}

input{
padding:14px;
border:none;
border-radius:10px;
font-size:15px;
outline:none;
}

button{
padding:15px;
background:#0ea5e9;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0284c7;
}

.message{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.login-link{
text-align:center;
margin-top:20px;
color:white;
}

.login-link a{
color:#38bdf8;
text-decoration:none;
}

.login-link a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>NaVi Global</h1>
<p>Create Your Account</p>
</div>

<form id="signupForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="number" id="age" placeholder="Age" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="text" id="username" placeholder="Create Username" required>

<input type="password" id="password" placeholder="Create Password" required>

<input type="password" id="confirmPassword" placeholder="Confirm Password" required>

<button type="submit">
Create Account
</button>

</form>

<div id="message" class="message"></div>

<div class="login-link">
Already have an account?
<a href="login.html">Login Here</a>
</div>

</div>

<script>

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxL8Px7cGg7pUt3XOHz3k8hSpeTaai5nCRMPms64QTiXUEsGqr3lUY-iEwq_PSlEqZ5/exec";

const form = document.getElementById("signupForm");
const message = document.getElementById("message");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const password =
document.getElementById("password").value;

const confirmPassword =
document.getElementById("confirmPassword").value;

if(password !== confirmPassword){
message.style.color = "red";
message.innerHTML = "Passwords do not match!";
return;
}

const data = {

name: document.getElementById("name").value,

age: document.getElementById("age").value,

phone: document.getElementById("phone").value,

email: document.getElementById("email").value,

username: document.getElementById("username").value,

password: password

};

try{

message.style.color = "#38bdf8";
message.innerHTML = "Creating account...";

const response = await fetch(WEBAPP_URL,{
method:"POST",
body:JSON.stringify(data)
});

const result = await response.text();

message.style.color = "lightgreen";
message.innerHTML = "Registration Successful!";

form.reset();

setTimeout(()=>{
window.location.href="login.html";
},1500);

}
catch(error){

message.style.color = "red";
message.innerHTML = "Registration Failed!";

console.error(error);

}

});

</script>

</body>
</html>
